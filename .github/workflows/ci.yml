name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  coins-app:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: coins-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: coins-app/package-lock.json

      - run: npm ci --legacy-peer-deps

      - run: npm run lint

      - run: npm test
        env:
          EXPO_PUBLIC_API_URL: https://api.getdelta.io/web

  ui-demo-checkbox:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui-demo-checkbox
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui-demo-checkbox/package-lock.json

      - run: npm ci

      - run: npm run lint

      - run: npm test
